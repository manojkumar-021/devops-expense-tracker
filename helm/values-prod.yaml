# Production values for Helm deployment

replicaCount: 5

image:
  repository: expense-app
  pullPolicy: IfNotPresent
  tag: "1.0"  # Use specific tag in production

service:
  type: LoadBalancer  # Use LoadBalancer in production
  port: 80
  targetPort: 3000

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

env:
  NODE_ENV: production
  LOG_LEVEL: info
